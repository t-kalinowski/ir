name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Install rig and non-default R (Unix)
        if: runner.os != 'Windows'
        run: |
          # Keep the GitHub setup actions above for Rust/Python/Quarto setup.
          # Use rig for R itself so CI has one R installer.
          scripts/install-dev-deps.sh \
            --skip rust \
            --skip python \
            --skip quarto

      - name: Install rig and non-default R (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Keep the GitHub setup actions above for Rust/Python/Quarto setup.
          # Use rig for R itself so CI has one R installer.
          .\scripts\install-dev-deps.ps1 `
            -Skip rust, python, quarto

      - name: Install R package docs dependencies
        run: Rscript scripts/install-docs-r-deps.R

      - run: cargo build --verbose
      - run: cargo test --verbose
        env:
          GITHUB_PAT: ${{ github.token }}

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
