name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      # No DESCRIPTION in this repo, so list the end-to-end fixture deps
      # explicitly (overriding the action's default `deps::.`).
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::pak
            any::renv
            any::secretbase
            any::cli
            any::glue
            any::jsonlite
            any::dplyr
            any::tidyr
            any::reticulate
            any::knitr
            any::rmarkdown
            any::btw
            any::Rapp
            any::docopt
            any::pkgsearch
            any::prettyunits

      # `ir run --r-version` resolves through rig, so the version-selection test
      # needs rig plus a second, non-default R. Provision both on Linux and
      # macOS; the Windows job is wired up separately once the `\\?\` path bug
      # in `ir run` is fixed (#32).
      #
      # Pin the default Rscript to the one set up above before installing rig:
      # on Linux `rig add` sets the first rig-managed R as the default and links
      # it into /usr/local/bin, which can otherwise shadow it on PATH.
      - name: Pin the default Rscript before installing rig
        if: runner.os != 'Windows'
        run: echo "IR_RSCRIPT=$(which Rscript)" >> "$GITHUB_ENV"

      - name: Install rig (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo curl -L https://rig.r-pkg.org/deb/rig.gpg -o /etc/apt/trusted.gpg.d/rig.gpg
          sudo sh -c 'echo "deb http://rig.r-pkg.org/deb rig main" > /etc/apt/sources.list.d/rig.list'
          sudo apt-get update
          sudo apt-get install -y r-rig

      - name: Install rig (macOS)
        if: runner.os == 'macOS'
        run: |
          brew tap r-lib/rig
          brew install --cask rig

      # `ir` resolves `--r-version` by version, but rig's own `run -r` matches the
      # install name (e.g. `4.4-arm64` on macOS), so look the name up. The run
      # library is built by `ir` with pak, so the second R only needs the
      # resolver toolchain (pak ships with rig).
      - name: Provision a non-default R for the version-selection test
        if: runner.os != 'Windows'
        run: |
          rig add 4.4.3
          name=$(rig list --json | jq -r '[.[] | select(.version == "4.4.3")][0].name')
          rig run -r "$name" -e 'pak::pkg_install(c("pak", "renv", "secretbase"))'
          echo "IR_TEST_R_VERSION=4.4.3" >> "$GITHUB_ENV"

      - run: cargo build --verbose
      - run: cargo test --verbose

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
