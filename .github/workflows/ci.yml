name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      # No DESCRIPTION in this repo, so list the end-to-end fixture deps
      # explicitly (overriding the action's default `deps::.`).
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::pak
            any::renv
            any::secretbase
            any::cli
            any::glue
            any::jsonlite
            any::dplyr
            any::tidyr
            any::reticulate
            any::fansi
            any::htmltools
            any::knitr
            any::rmarkdown
            any::quarto
            any::btw
            any::Rapp
            any::docopt
            any::pkgsearch
            any::prettyunits

      - name: Install rig and non-default R (Unix)
        if: runner.os != 'Windows'
        run: |
          # Keep the GitHub setup actions above for Rust/Python/Quarto/default R
          # caching and environment setup. Use rig's default release plus a
          # second R to exercise version-selection tests.
          scripts/install-dev-deps.sh \
            --skip rust \
            --skip python \
            --skip quarto
          echo "IR_TEST_R_VERSION=4.4.3" >> "$GITHUB_ENV"

      - name: Install rig and non-default R (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Keep the GitHub setup actions above for Rust/Python/Quarto/default R
          # caching and environment setup. Use rig's default release plus a
          # second R to exercise version-selection tests.
          .\scripts\install-dev-deps.ps1 `
            -Skip rust, python, quarto
          Add-Content -Path $env:GITHUB_ENV -Value "IR_TEST_R_VERSION=4.4.3"

      - run: cargo build --verbose
      - run: cargo test --verbose
        env:
          GITHUB_PAT: ${{ github.token }}

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
