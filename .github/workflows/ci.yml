name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
    types: [checks_requested]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: quarto-dev/quarto-actions/setup@v2
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      # No DESCRIPTION in this repo, so list the end-to-end fixture deps
      # explicitly (overriding the action's default `deps::.`).
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            any::pak
            any::renv
            any::secretbase
            any::cli
            any::glue
            any::jsonlite
            any::dplyr
            any::tidyr
            any::reticulate
            any::fansi
            any::htmltools
            any::knitr
            any::rmarkdown
            any::xfun
            any::quarto
            any::bookdown
            any::btw
            any::Rapp
            any::docopt
            any::pkgsearch
            any::prettyunits

      # `ir run --r-version` resolves through rig, so the version-selection test
      # needs rig plus a second, non-default R.
      # Pin the default Rscript to the one set up above before installing rig.
      # On Linux `rig add` makes the first rig-managed R the default and relinks
      # /usr/local/bin/Rscript to it, so pinning the symlink (`which Rscript`)
      # would silently follow rig's R. Resolve the real per-version binary
      # instead, which rig never touches.
      - name: Pin the default Rscript before installing rig (Unix)
        if: runner.os != 'Windows'
        run: |
          rscript_path=$(Rscript -e 'cat(file.path(R.home("bin"), "Rscript"))')
          echo "IR_RSCRIPT=$rscript_path" >> "$GITHUB_ENV"

      - name: Pin the default Rscript before installing rig (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $rscriptPath = Rscript -e "cat(normalizePath(file.path(R.home('bin'), 'Rscript.exe'), winslash = '/', mustWork = TRUE))"
          Add-Content -Path $env:GITHUB_ENV -Value "IR_RSCRIPT=$rscriptPath"

      - name: Install rig and non-default R (Unix)
        if: runner.os != 'Windows'
        run: |
          # Keep the GitHub setup actions above for Rust/Python/Quarto/default R
          # caching and environment setup. Use this script here only for rig and
          # the second R needed by the version-selection tests.
          scripts/install-dev-deps.sh \
            --skip rust \
            --skip python \
            --skip quarto \
            --skip r-release
          echo "IR_TEST_R_VERSION=4.4.3" >> "$GITHUB_ENV"

      - name: Install rig and non-default R (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Keep the GitHub setup actions above for Rust/Python/Quarto/default R
          # caching and environment setup. Use this script here only for rig and
          # the second R needed by the version-selection tests.
          .\scripts\install-dev-deps.ps1 `
            -Skip rust, python, quarto, r-release
          Add-Content -Path $env:GITHUB_ENV -Value "IR_TEST_R_VERSION=4.4.3"

      - name: Warm default R package cache
        shell: bash
        run: |
          "$IR_RSCRIPT" scripts/warm-renv-cache.R \
            cli glue jsonlite dplyr tidyr github::rstudio/reticulate fansi htmltools knitr rmarkdown xfun quarto \
            btw Rapp docopt pkgsearch prettyunits
        env:
          GITHUB_PAT: ${{ github.token }}

      - name: Warm snapshot R package cache
        shell: bash
        run: |
          "$IR_RSCRIPT" scripts/warm-renv-cache.R \
            --repos https://packagemanager.posit.co/cran/2026-06-01 \
            dplyr tidyr glue jsonlite rmarkdown bookdown tinytex xfun
        env:
          R_PROFILE_USER: ${{ github.workspace }}/scripts/ci-rprofile.R

      - run: cargo nextest run --verbose --no-fail-fast
        env:
          GITHUB_PAT: ${{ github.token }}
          R_PROFILE_USER: ${{ github.workspace }}/scripts/ci-rprofile.R

  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
